services:
  signaling:
    build:
      context: ../server
      dockerfile: ../infra/Dockerfile.go
      args:
        SERVICE: signaling
    environment:
      SIGNALING_ADDR: ":8080"
    ports:
      - "8080:8080"

  stun:
    build:
      context: ../server
      dockerfile: ../infra/Dockerfile.go
      args:
        SERVICE: stun
    environment:
      STUN_ADDR: ":3478"
    ports:
      - "3478:3478/udp"

  turn:
    build:
      context: ../server
      dockerfile: ../infra/Dockerfile.go
      args:
        SERVICE: turn
    environment:
      TURN_ADDR: ":3479"
      TURN_REALM: "webrtc-own"
      TURN_PUBLIC_IP: "127.0.0.1"
      TURN_STATIC_USER: "demo"
      TURN_STATIC_PASS: "demo"
      # Ative ephemeral creds gerando segredo e exportando:
      # TURN_AUTH_SECRET: "change-me"
    network_mode: "host"
    # Usa host network pra relay UDP funcionar (porta efêmera por allocation).

  sfu:
    build:
      context: ../server
      dockerfile: ../infra/Dockerfile.go
      args:
        SERVICE: sfu
    environment:
      SFU_HTTP_ADDR: ":8081"
      SFU_UDP_ADDR: ":7000"
      SFU_PUBLIC_IP: "127.0.0.1"
    ports:
      - "8081:8081"
      - "7000:7000/udp"
